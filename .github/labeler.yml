# Basic configuration for actions/labeler
frontend:
  - any:
    - 'src/**/*'
    - 'pages/**/*'
    - 'components/**/*'

backend:
  - any:
    - 'api/**/*'
    - 'functions/**/*'

security:
  - any:
    - 'api/urlValidator.ts'
    - 'api/social.ts'
    - 'api/server.ts'
    - 'api/authMiddleware.ts'

ci:
  - any:
    - '.github/**/*'
