frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/**/*'
      - 'pages/**/*'
      - 'components/**/*'
      - 'hooks/**/*'
      - 'contexts/**/*'
      - 'styles/**/*'
      - 'public/**/*'

backend:
  - changed-files:
    - any-glob-to-any-file:
      - 'api/**/*'
      - 'functions/**/*'
      - 'jobs/**/*'
      - 'utils/**/*'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**/*'
      - '*.md'

config:
  - changed-files:
    - any-glob-to-any-file:
      - '*.json'
      - '*.config.js'
      - '*.config.ts'
      - 'pnpm-lock.yaml'

testing:
  - changed-files:
    - any-glob-to-any-file:
      - '__tests__/**/*'
      - '__mocks__/**/*'
      - 'e2e/**/*'
      - '*.test.ts'
      - '*.test.tsx'

ci-cd:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**/*'

types:
  - changed-files:
    - any-glob-to-any-file:
      - 'types/**/*'
