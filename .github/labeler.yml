# Add 'ui' label to any changes within the components directory
ui:
  - changed-files:
    - any-glob-to-any-file: 'components/**/*'

# Add 'api' label to any changes within the api directory
api:
  - changed-files:
    - any-glob-to-any-file: 'api/**/*'

# Add 'tests' label to any changes within the __tests__ directory
tests:
  - changed-files:
    - any-glob-to-any-file: '__tests__/**/*'

# Add 'dependencies' label to any changes in package files
dependencies:
  - changed-files:
    - any-glob-to-any-file: 'package.json'
    - any-glob-to-any-file: 'package-lock.json'
    - any-glob-to-any-file: 'pnpm-lock.yaml'