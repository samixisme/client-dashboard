name: Squash and Merge Non-Conflicted PRs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list PRs without merging)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      pr_limit:
        description: 'Maximum number of open PRs to consider (default: 500)'
        required: false
        default: '500'
        type: string
      mergeability_wait_seconds:
        description: 'Seconds to wait before re-checking an UNKNOWN mergeability status (default: 10)'
        required: false
        default: '10'
        type: string
      post_merge_sleep_seconds:
        description: 'Seconds to pause after each merge so GitHub can recompute remaining PR mergeability (default: 3)'
        required: false
        default: '3'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  squash-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Squash and merge all non-conflicted open PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
          PR_LIMIT: ${{ inputs.pr_limit || '500' }}
          MERGEABILITY_WAIT: ${{ inputs.mergeability_wait_seconds || '10' }}
          POST_MERGE_SLEEP: ${{ inputs.post_merge_sleep_seconds || '3' }}
        run: |
          set -euo pipefail

          MERGED=0
          SKIPPED_CONFLICT=0
          SKIPPED_UNKNOWN=0
          FAILED=0

          echo "Fetching open PRs..."
          mapfile -t PR_NUMBERS < <(
            gh pr list \
              --repo "$REPO" \
              --state open \
              --limit "$PR_LIMIT" \
              --json number \
              --jq '.[].number' \
              | sort -n
          )

          echo "Found ${#PR_NUMBERS[@]} open PR(s)"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN MODE — no merges will be performed"
          fi
          echo ""

          for PR in "${PR_NUMBERS[@]}"; do
            echo "=== PR #${PR} ==="

            # Re-fetch mergeability each iteration so prior merges are reflected
            PR_DATA=$(
              gh pr view "$PR" \
                --repo "$REPO" \
                --json number,title,mergeable,headRefName \
                2>/dev/null || true
            )

            if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
              echo "  Could not fetch data for PR #${PR} — skipping"
              FAILED=$((FAILED + 1))
              continue
            fi

            TITLE=$(echo "$PR_DATA" | jq -r '.title // "Unknown"')
            MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable // "UNKNOWN"')
            HEAD=$(echo "$PR_DATA" | jq -r '.headRefName // ""')

            echo "  Title:       $TITLE"
            echo "  Head branch: $HEAD"
            echo "  Mergeable:   $MERGEABLE"

            # GitHub computes mergeability asynchronously; retry once if UNKNOWN
            if [ "$MERGEABLE" = "UNKNOWN" ]; then
              echo "  Mergeability not yet computed — waiting ${MERGEABILITY_WAIT} s and retrying..."
              sleep "$MERGEABILITY_WAIT"
              MERGEABLE=$(
                gh pr view "$PR" \
                  --repo "$REPO" \
                  --json mergeable \
                  --jq '.mergeable // "UNKNOWN"' \
                  2>/dev/null || echo "UNKNOWN"
              )
              echo "  Re-checked mergeability: $MERGEABLE"
            fi

            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              if [ "${DRY_RUN}" = "true" ]; then
                echo "  [DRY RUN] Would squash-merge PR #${PR} and delete branch '${HEAD}'"
                MERGED=$((MERGED + 1))
              else
                echo "  Squash-merging PR #${PR}..."
                if gh pr merge "$PR" \
                    --repo "$REPO" \
                    --squash \
                    --delete-branch \
                    --yes \
                    2>&1; then
                  echo "  ✅ Successfully merged and branch deleted"
                  MERGED=$((MERGED + 1))
                  # Brief pause so GitHub can update mergeability for remaining PRs
                  sleep "$POST_MERGE_SLEEP"
                else
                  echo "  ❌ Merge failed"
                  FAILED=$((FAILED + 1))
                fi
              fi
            elif [ "$MERGEABLE" = "CONFLICTING" ]; then
              echo "  ⚠️  Skipping — has merge conflicts"
              SKIPPED_CONFLICT=$((SKIPPED_CONFLICT + 1))
            else
              echo "  ⚠️  Skipping — mergeability still unknown after retry"
              SKIPPED_UNKNOWN=$((SKIPPED_UNKNOWN + 1))
            fi

            echo ""
          done

          echo "========================================"
          echo "Summary"
          echo "========================================"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "  Would merge:             $MERGED"
          else
            echo "  Merged (+ branch deleted): $MERGED"
          fi
          echo "  Skipped (conflicts):       $SKIPPED_CONFLICT"
          echo "  Skipped (unknown):         $SKIPPED_UNKNOWN"
          echo "  Failed:                    $FAILED"
          echo "========================================"
